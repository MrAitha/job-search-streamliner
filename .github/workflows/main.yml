name: Daily Job Scraper
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *' # 9 AM Daily
  workflow_dispatch:
    inputs:
      adhoc_email:
        description: 'Adhoc Email Address (Overrides Secret)'
        required: false
        type: string

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/scrape.py

      - name: Run Email Notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL_ADDRESS: ${{ github.event.inputs.adhoc_email || secrets.TO_EMAIL_ADDRESS }}
        run: python scripts/send_email.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/jobs.json
          git commit -m "Automated update: jobs.json" || echo "No changes to commit"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build React App
        run: |
          npm install
          npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
